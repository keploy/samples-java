services:
  java-dedup:
    image: ${JAVA_DEDUP_IMAGE:-java-dedup:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAVA_VERSION: ${JAVA_VERSION:-8}
    container_name: dedup-java
    ports:
      - "${JAVA_DEDUP_HOST_PORT:-8080}:8080"
    environment:
      KEPLOY_JAVA_CLASS_DIRS: /app/target/classes
    volumes:
      - type: bind
        source: /tmp
        target: /tmp
