# Hibernate cache tour — Spring Boot configuration.
#
# Datasource is overridable via SPRING_DATASOURCE_* env vars; defaults match
# the docker-compose.yml in the CI harness. The pgjdbc URL deliberately omits
# `prepareThreshold=` so the driver default of 5 applies — that's the value
# the exerciser counts on for the format-flip trigger.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/hibcache}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hibcache}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hibcache}
spring.datasource.driver-class-name=org.postgresql.Driver

# We let Hibernate validate the schema only — the docker container init.sql
# creates the tables and the seed data the exerciser depends on (ids 1..4).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# --- Hibernate L2 + query cache -------------------------------------------
# These four flags together flip on the cache surface that issue #3 needs.
# JCacheRegionFactory delegates to javax.cache.spi.CachingProvider, which
# the EHCache 3.x Jakarta classifier registers automatically when on the
# classpath. No explicit ehcache.xml is required for the default config.
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=jcache
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider

# Default Spring Boot cache type (kept consistent with the JPA L2 provider).
spring.cache.type=jcache

# Server / actuator
server.port=${SERVER_PORT:8080}
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
