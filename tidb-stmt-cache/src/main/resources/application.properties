server.port=8080

# --- TiDB DataSource (Flipkart-shape) ---
# TiDB :4000 speaks the MySQL wire protocol, so the MySQL Connector/J 8.x
# driver works as-is. JDBC URL parameters that matter:
#
#   useServerPrepStmts=true       server-side prepared statements (stmtIDs
#                                 come from the database, not the client).
#   cachePrepStmts=true           per-Connection PreparedStatement cache
#                                 keyed by SQL text. Causes Connector/J to
#                                 skip COM_STMT_PREPARE on cache hits and
#                                 emit only COM_STMT_EXECUTE.
#   prepStmtCacheSize=500         retain enough entries to span a record.
#   prepStmtCacheSqlLimit=2048    enlarge max-SQL-len so longer Hibernate
#                                 INSERTs/UPDATES still cache.
#
# root / no password matches the default TiDB bootstrap user in the
# pingcap/tidb:v8.5.x image started by docker-compose.yml.
keploy.datasource.jdbc-url=jdbc:mysql://localhost:4000/test?useSSL=false&allowPublicKeyRetrieval=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=500&prepStmtCacheSqlLimit=2048
keploy.datasource.username=root
keploy.datasource.password=
keploy.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
keploy.datasource.pool-name=tidb-dataSource
keploy.datasource.minimum-idle=2
keploy.datasource.maximum-pool-size=10
keploy.datasource.idle-timeout=60000
keploy.datasource.max-lifetime=1800000
keploy.datasource.connection-timeout=10000
keploy.datasource.connection-test-query=SELECT 1
keploy.datasource.validation-timeout=5000

# --- JPA / Hibernate ---
# MySQLDialect: TiDB is wire-compatible, the dialect's SQL output is
# accepted by TiDB 8.5.x as long as the Hibernate version stays on the
# MySQL family (not MariaDB-specific syntax).
#
# open-in-view=false: critical for the test. With OSIV enabled, the JPA
# session is held open for the whole HTTP request, which would surface
# additional COMMIT traffic at request-end that does not match the
# Hibernate-managed COMMIT inside the @Transactional service method.
#
# provider_disables_autocommit=true: pairs with HikariCP's
# autoCommit=false. Hibernate explicitly turns autocommit off on
# connection acquire instead of issuing SET autocommit=0 once per
# transaction — fewer wire-level statements, more deterministic
# record/replay.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Apache Pulsar ---
# The Java client connects to a Pulsar broker on :6650 (binary protocol).
# The topic is pre-created as partitioned (events.partitions partitions)
# by the docker-compose pulsar-init container so the default
# RoundRobinPartitionRouter has real partitions to round-robin across.
pulsar.broker-url=pulsar://localhost:6650
pulsar.topic=persistent://public/default/events
pulsar.partitions=8
