apiVersion: v1
kind: Service
metadata:
  name: customer360
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: customer360
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: customer360
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
      # The kind cluster (kind-config.yaml) exposes 30080 to the host.
      # http://localhost:30080 → this Service → the pod.
      nodePort: 30080
