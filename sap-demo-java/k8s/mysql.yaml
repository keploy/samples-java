# MySQL 8 sidecar for the Customer 360 local store (tags, notes, audit).
#
# Companion to k8s/postgres.yaml — applied only when DB_BACKEND=mysql is
# passed to deploy_kind.sh. Shape matches the Postgres manifest: Secret +
# Service + Deployment, emptyDir (not PVC) so every pod restart gives a
# fresh DB for demo/recording purposes.
#
# For a production deployment this should be a managed MySQL (AWS RDS,
# Azure Database for MySQL, Cloud SQL, etc.) or at minimum a StatefulSet
# with a real PVC.
---
apiVersion: v1
kind: Secret
metadata:
  name: customer360-db
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: customer360
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Keys mirror the Postgres-flavoured Secret so the Deployment manifest
  # can reference POSTGRES_USER / POSTGRES_PASSWORD unchanged — they are
  # just credentials, not driver-specific names.
  POSTGRES_DB: customer360
  POSTGRES_USER: customer360
  POSTGRES_PASSWORD: customer360
  MYSQL_DATABASE: customer360
  MYSQL_USER: customer360
  MYSQL_PASSWORD: customer360
  MYSQL_ROOT_PASSWORD: customer360-root
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/component: database
      annotations:
        # Tell Keploy's k8s-proxy that this pod produces recordable
        # MySQL wire-protocol traffic from the customer360 pod.
        keploy.io/capture: "mysql"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-authentication-plugin=caching_sha2_password
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          envFrom:
            - secretRef:
                name: customer360-db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u customer360 -pcustomer360
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u customer360 -pcustomer360
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          emptyDir: {}
