apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer360
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: customer360
    app.kubernetes.io/component: integration-service
    app.kubernetes.io/part-of: customer360
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: customer360
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer360
        app.kubernetes.io/component: integration-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        # Marker read by Keploy k8s-proxy when live-recording is enabled.
        keploy.io/record: "enabled"
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        # Wait for Postgres to accept connections before the Spring app starts.
        # Avoids a noisy Flyway/DataSource retry loop in the main container.
        - name: wait-for-postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres.sap-demo.svc.cluster.local:5432"
              until pg_isready -h postgres -p 5432 -U customer360 -d customer360 >/dev/null 2>&1; do
                sleep 2
              done
              echo "postgres ready"
      containers:
        - name: customer360
          image: customer360:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: customer360-config
            - secretRef:
                name: customer360-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres.sap-demo.svc.cluster.local:5432/customer360
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: customer360-db
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: customer360-db
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 3
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
