# Postgres 16 for the Customer 360 local store (tags, notes, audit).
#
# Kept in a single file for demo-legibility: Secret + Service + Deployment.
# emptyDir volume (not PVC) — fresh DB on every pod restart, which is fine
# for demo/recording purposes and eliminates PVC provisioner complexity.
#
# For a production deployment this should be a managed Postgres (AWS RDS,
# Azure DB for Postgres, SAP HANA Cloud, etc.) or at minimum a StatefulSet
# with a real PVC.
---
apiVersion: v1
kind: Secret
metadata:
  name: customer360-db
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: customer360
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_DB: customer360
  POSTGRES_USER: customer360
  POSTGRES_PASSWORD: customer360
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sap-demo
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
      annotations:
        # Tell Keploy's k8s-proxy that this pod produces recordable
        # Postgres wire-protocol traffic from the customer360 pod.
        keploy.io/capture: "postgres"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: customer360-db
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "customer360", "-d", "customer360"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "customer360", "-d", "customer360"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
